<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PDF Kütüphanesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .dizin-baslik {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
            padding-bottom: 5px;
            border-bottom: 2px solid #3498db;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }
        li {
            margin-bottom: 8px;
        }
        a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #ecf0f1;
            color: #34495e;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.2s;
        }
        a:hover {
            background: #3498db;
            color: white;
            transform: translateX(5px);
        }
    </style>
</head>
<body>
