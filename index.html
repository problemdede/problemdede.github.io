<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>ProblemDede</title>
  <style>
    /* Cevap gizliyken görünecek stil */
    .gizli-cevap .cevap-icerik {
      display: none;
    }
    .gizli-cevap .cevap-tetikleyici {
      color: #42b983;
      cursor: pointer;
      text-decoration: underline;
      font-weight: bold;
    }
    /* Tıklandığında tetikleyiciyi gizle, içeriği göster */
    .cevap-goster .cevap-tetikleyici {
      display: none;
    }
    .cevap-goster .cevap-icerik {
      display: inline;
    }
  </style>



  <!-- Docsify Tema -->
  <link rel="shortcut icon" href="./assets/problemdede.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'ProblemDede İçerikleri',
      logo: './assets/problemdede.svg',
      loadNavbar: true,
      homepage: 'README.md'
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
  <script>
    // Tıklanan elemanın sınıfını değiştirerek cevabı gösteren fonksiyon
    function cevabiAc(el) {
      el.parentElement.classList.add('cevap-goster');
    }
  </script>

</body>
</html>
