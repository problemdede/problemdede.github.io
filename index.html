    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="controls">
        <div id="fast-prev-btn" class="fast-btn"> << </div>
        <div id="prev-btn" class="arrow"> < </div>
        <div id="next-btn" class="arrow"> > </div>
        <div id="fast-next-btn" class="fast-btn"> >> </div>
    </div>
    <script>
        const container = document.getElementById("presentation-container");
        function resize() {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener("resize", resize);
        window.addEventListener("load", resize);
        resize();

        const tl = gsap.timeline({ onUpdate: updateUI });
        gsap.set(".slide", { display: "none", opacity: 0 });
        gsap.set(".slide:first-child", { display: "block", opacity: 1 });

        
tl.addLabel("slayt_1");
gsap.set("#slayt_1_text5", {opacity: 0});
gsap.set("#slayt_1_rect13", {opacity: 0});
gsap.set("#slayt_1_rect12", {opacity: 0});
gsap.set("#slayt_1_rect9", {opacity: 0});
gsap.set("#slayt_1_rect11", {opacity: 0});
gsap.set("#slayt_1_rect14", {opacity: 0});
tl.to("#slayt_1_text5", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect13", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect13", {rotation: 10, transformOrigin: "center", duration: 1}, "<");
tl.to("#slayt_1_rect12", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect12", {rotation: -10, transformOrigin: "center", duration: 1}, "<");
tl.to("#slayt_1_rect9", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect9", {rotation: -5, transformOrigin: "center", duration: 1}, "<");
tl.to("#slayt_1_rect11", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect11", {rotation: 5, transformOrigin: "center", duration: 1}, "<");
tl.to("#slayt_1_rect14", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_1_rect14", {rotation: 8, transformOrigin: "center", duration: 1}, "<");
tl.addPause();
// --- slayt_1 -> slayt_2 geçişi ---
tl.to("#slayt_1", {opacity: 0, duration: 0.5});
tl.set("#slayt_1", {display: "none"});
tl.set("#slayt_2", {display: "block", opacity: 0});
tl.to("#slayt_2", {opacity: 1, duration: 0.5});

tl.addLabel("slayt_2");
gsap.set("#slayt_2_g1", {opacity: 0});
gsap.set("#slayt_2_g8", {opacity: 0});
tl.to("#slayt_2_g8", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_2_g1", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_2_g1", {x: 0, y: 100, duration: 1}, "<");
tl.addPause();
// --- slayt_2 -> slayt_3 geçişi ---
tl.to("#slayt_2", {opacity: 0, duration: 0.5});
tl.set("#slayt_2", {display: "none"});
tl.set("#slayt_3", {display: "block", opacity: 0});
tl.to("#slayt_3", {opacity: 1, duration: 0.5});

tl.addLabel("slayt_3");
gsap.set("#slayt_3_g19", {opacity: 0});
gsap.set("#slayt_3_g22", {opacity: 0});
gsap.set("#slayt_3_g24", {opacity: 0});
gsap.set("#slayt_3_g23", {opacity: 0});
tl.to("#slayt_3_g19", {opacity: 1, duration: 1}, "<");
tl.addPause();
tl.to("#slayt_3_g22", {opacity: 1, duration: 1});
tl.addPause();
tl.fromTo("#slayt_3_path19", { strokeDasharray: function(i, target) { return target.getTotalLength(); },   strokeDashoffset: function(i, target) { return target.getTotalLength(); } }, { strokeDashoffset: 0, duration: 1, ease: "power1.inOut" });
tl.to("#slayt_3_g24", {opacity: 1, duration: 1}, "<");
tl.addPause();
tl.to("#slayt_3_g23", {opacity: 1, duration: 1});
tl.addPause();
// --- slayt_3 -> slayt_4 geçişi ---
tl.to("#slayt_3", {opacity: 0, duration: 0.5});
tl.set("#slayt_3", {display: "none"});
tl.set("#slayt_4", {display: "block", opacity: 0});
tl.to("#slayt_4", {opacity: 1, duration: 0.5});

tl.addLabel("slayt_4");
gsap.set("#slayt_4_g4", {opacity: 0});
gsap.set("#slayt_4_g2", {opacity: 0});
gsap.set("#slayt_4_g3", {opacity: 0});
gsap.set("#slayt_4_text4", {opacity: 0});
gsap.set("#slayt_4_text1", {opacity: 0});
tl.to("#slayt_4_g4", {opacity: 1, duration: 1}, "<");
tl.to("#slayt_4_text1", {opacity: 1, duration: 1}, "<");
tl.addPause();
tl.to("#slayt_4_g2", {opacity: 1, duration: 1});
tl.addPause();
tl.to("#slayt_4_text1", {fill: "#800000ff", duration: 1});
tl.fromTo("#slayt_4_path4", { strokeDasharray: function(i, target) { return target.getTotalLength(); },   strokeDashoffset: function(i, target) { return target.getTotalLength(); } }, { strokeDashoffset: 0, duration: 1, ease: "power1.inOut" }, "<");
tl.to("#slayt_4_text4", {opacity: 1, duration: 1}, "<");
tl.addPause();
tl.to("#slayt_4_g3", {opacity: 1, duration: 1});
tl.addPause();


        function updateUI() {
            const progress = tl.progress();
            document.getElementById("progress-bar").style.width = (progress * 100) + "%";
        }
        function next() { if (tl.progress() < 1) tl.play(); }
        function prev() { if (tl.progress() > 0) tl.reverse(); }
        function fastNext() {
            const currentTime = tl.time();
            let nextLabelTime = Infinity;
            let nextLabelName = null;
            for (let name in tl.labels) {
                let time = tl.labels[name];
                if (time > currentTime + 0.1 && time < nextLabelTime) { nextLabelTime = time; nextLabelName = name; }
            }
            if (nextLabelName) tl.pause(nextLabelName);
            else tl.pause(tl.duration());
        }
        function fastPrev() {
            const currentTime = tl.time();
            let prevLabelTime = -1;
            let prevLabelName = null;
            for (let name in tl.labels) {
                let time = tl.labels[name];
                if (time < currentTime - 0.5 && time > prevLabelTime) { prevLabelTime = time; prevLabelName = name; }
            }
            if (prevLabelName) tl.pause(prevLabelName);
            else tl.pause(0);
        }
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") next();
            if (e.key === "ArrowLeft") prev();
            if (e.key === "ArrowDown" || e.key === "PageDown") fastNext();
            if (e.key === "ArrowUp" || e.key === "PageUp") fastPrev();
        });
        document.getElementById("next-btn").addEventListener("click", next);
        document.getElementById("prev-btn").addEventListener("click", prev);
        document.getElementById("fast-next-btn").addEventListener("click", fastNext);
        document.getElementById("fast-prev-btn").addEventListener("click", fastPrev);
        window.onload = () => { tl.play(); };
    </script>
